project_identifier: extrabotany
commit_message: "[ci skip]"
base_path: .

files:
  # 中文作为 zh_cn 的源语言
  - source: /Xplat/src/main/resources/assets/extrabotany/lang/zh_cn.json
    translation: /Xplat/src/main/resources/assets/extrabotany/lang/%locale_with_underscore%.json
    languages_mapping:
      locale_with_underscore:
        zh-TW: zh_tw
    # 限制只翻译 zh-TW
    translation_replace:
      - pattern: '%locale_with_underscore%'
        replacement: 'zh_tw'

  # 英文作为其他语言的源语言
  - source: /Xplat/src/main/resources/assets/extrabotany/lang/en_us.json
    translation: /Xplat/src/main/resources/assets/extrabotany/lang/%locale_with_underscore%.json
    languages_mapping:
      locale_with_underscore:
        de: de_de
        ru: ru_ru
        fr: fr_fr
        ja: ja_jp
        en: en_us