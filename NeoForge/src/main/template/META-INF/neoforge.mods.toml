modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/lounode/ExtraBotany/issues"

[[mixins]]
config="${mod_id}_xplat.mixins.json"

[[mixins]]
config="${mod_id}_neoforge.mixins.json"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    displayURL="https://github.com/lounode/ExtraBotany"
    #updateJSONURL=""
    logoFile="${mod_logo}"
    credits="${mod_credits}"
    authors="${mod_authors}"
    description='''${mod_description}'''

#Necessary
[[dependencies."${mod_id}"]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="botania"
    type="required"
    versionRange="${botania_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="patchouli"
    type="required"
    versionRange="${patchouli_version_range}"
    ordering="AFTER"
    side="BOTH"
[[dependencies."${mod_id}"]]
    modId="curios"
    type="required"
    versionRange="${curios_version_range}"
    ordering="AFTER"
    side="BOTH"
#Integration
[[dependencies."${mod_id}"]]
    modId="jei"
    type="optional"
    versionRange="${jei_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies."${mod_id}"]]
    modId="kubejs"
    type="optional"
    versionRange="${kubejs_version_range}"
    ordering="NONE"
    side="BOTH"

